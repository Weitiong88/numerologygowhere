  ===== ALL 5 BUG PATCHES =====

  PATCH 1 - BUG 4: Sign In button (header) opens auth modal
  Find: document.getElementById('btnSignIn').addEventListener('click', ...)
  Replace click handler body with:
    openAuthModal();

  PATCH 2 - BUG 1: Share My Reading button
  Find the Share button click handler (looks for 'shareBtn' or 'Share My Reading')
  Replace with:
    const btn = document.querySelector('[data-share], #shareBtn, button.share-btn');
    if (btn) btn.addEventListener('click', async () => {
      if (!currentUser) {
        showToast('Please sign in to share your reading');
        openAuthModal();
        return;
      }
      const shareUrl = window.location.href;
      if (navigator.share) {
        await navigator.share({ title: 'My Numerology Reading', url: shareUrl });
      } else {
        await navigator.clipboard.writeText(shareUrl);
        showToast('Link copied to clipboard!');
      }
    });

  PATCH 3 - BUG 2: Referral code translations (English mode)
  Find the translations/i18n object (search for 'referral' or '有推荐码')
  Add to EN translations:
    referralPrompt: 'Got a referral code? Enter for 10% off',
    referralApply: 'Apply',
    referralPlaceholder: 'NGW-XXXXXX'
  Find the referral HTML section and add data-lang-key attributes

  PATCH 4 - BUG 3: Lo Shu Tap button translation
  Find: id="loShuTooltip" or the button showing 'Tap a number to see its energy'
  Wrap text in span with translation key:
    <span data-zh='点击数字查看其能量' data-en='Tap a number to see its energy'>
      Tap a number to see its energy
    </span>
  Then add to the language switch function:
    loShuTooltip.querySelector('span').textContent = lang === 'zh'
      ? '点击数字查看其能量' : 'Tap a number to see its energy';

  PATCH 5 - BUG 5: Back navigation on Architects of Life page
  Find the Architects section show/display function
  Add at the beginning of the section HTML:
    <button onclick="showSection('calculator')" style="position:absolute;top:1rem;left:1rem;">
      ← Back
    </button>
  Or ensure the main nav stays visible when Architects section is shown.
